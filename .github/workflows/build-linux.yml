name: Build Linux Executable

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk libx11-6
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter pynput packaging

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --noconsole --onefile --name "AudioHD_Linux" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AudioHD_Linux_App
        path: dist/AudioHD_Linux
